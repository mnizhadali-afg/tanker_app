services:
  - type: web
    name: tanker-backend
    env: node
    plan: free
    buildCommand: npm install --include=dev && npm run build --workspace=packages/shared && cd backend && npx prisma generate && npm run build
    startCommand: cd backend && npx prisma migrate deploy && node dist/main.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRY
        value: 1h
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_REFRESH_EXPIRY
        value: 7d
      - key: FRONTEND_URL
        sync: false
